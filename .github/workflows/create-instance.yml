name: Oracle ARM Instance Creator

on:
  workflow_dispatch:  # allows manual trigger

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create symlink to fake ubuntu home
        run: |
          sudo mkdir -p /home/ubuntu
          sudo ln -s /home/runner/work/oracle-freetier-instance-creation/oracle-freetier-instance-creation /home/ubuntu/oracle-freetier-instance-creation

      - name: Create oci.env and OCI config
        run: |
          # Create oci.env file
          cat <<EOF > oci.env
          OCI_CONFIG=oci_config
          OCT_FREE_AD=AD-1
          DISPLAY_NAME=oracle-arm-instance
          REQUEST_WAIT_TIME_SECS=60
          SSH_AUTHORIZED_KEYS_FILE=ssh_key.pub
          OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}
          OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}
          OPERATING_SYSTEM=Canonical Ubuntu
          OS_VERSION=24.04
          ASSIGN_PUBLIC_IP=true
          BOOT_VOLUME_SIZE=50
          NOTIFY_EMAIL=False
          DISCORD_WEBHOOK=
          EOF

          # Create oci_config file
          cat <<EOF > oci_config
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=private_key.pem
          EOF

          # Create private key file
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          # Create SSH public key file
          echo "${{ secrets.OCI_SSH_PUBLIC_KEY }}" > ssh_key.pub

      - name: Run instance creation script
        run: python3 main.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

      - name: Notify via ntfy
        if: success()
        run: |
          curl -d "🎉 Oracle ARM instance created successfully!" ntfy.sh/${{ secrets.NTFY_TOPIC }}
